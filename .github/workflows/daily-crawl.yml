name: Daily Crawl

on:
  schedule:
    # 08:30 Asia/Seoul = 23:30 UTC (previous day)
    - cron: "30 23 * * *"
  workflow_dispatch:

# 동시 실행 방지: 진행 중이면 새 요청은 대기 없이 취소
concurrency:
  group: daily-crawl
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run product and subscription crawlers
        run: python scripts/run_daily_crawl.py

      - name: Commit updated database
        shell: bash
        run: |
          if git diff --quiet -- data/himart.db; then
            echo "No database changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/himart.db
          git commit -m "chore: refresh crawler data"
          git push
