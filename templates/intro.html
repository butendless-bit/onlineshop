<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%;
    background:#000; overflow:hidden;
    font-family:'Noto Sans KR', sans-serif;
  }

  #curtain {
    position:fixed; inset:0;
    background:linear-gradient(135deg, #8B0000 0%, #E50914 50%, #8B0000 100%);
    opacity:0; pointer-events:none; z-index:100;
  }

  #stage {
    position:relative; width:100vw; height:100vh;
    display:flex; align-items:center; justify-content:center;
  }
  #glow {
    position:fixed; inset:0;
    background:radial-gradient(ellipse at center, rgba(229,9,20,0.2) 0%, transparent 70%);
    pointer-events:none; opacity:0;
  }
  #logo {
    position:relative;
    display:flex; align-items:center; justify-content:center;
  }

  #on-block {
    font-family:'Noto Sans KR', sans-serif;
    font-weight:900; font-size:clamp(80px,15vw,160px);
    line-height:1; letter-spacing:-4px; color:#E50914;
    text-shadow:2px 2px 0 #8B0000, 5px 5px 0 #5a0000, 0 0 60px rgba(229,9,20,0.3);
    opacity:0; transform:scale(2.5); filter:brightness(3);
  }
  #rest {
    font-family:'Noto Sans KR', sans-serif;
    font-weight:900; font-size:clamp(80px,15vw,160px);
    line-height:1; letter-spacing:-4px; color:#E50914;
    text-shadow:2px 2px 0 #8B0000, 5px 5px 0 #5a0000, 0 0 60px rgba(229,9,20,0.3);
    clip-path:inset(0 100% 0 0); white-space:nowrap;
  }
  #sweep {
    position:absolute; top:0; left:-100%; width:50%; height:100%;
    background:linear-gradient(105deg, transparent 0%,
      rgba(255,255,255,0.08) 40%, rgba(255,255,255,0.3) 50%,
      rgba(255,255,255,0.08) 60%, transparent 100%);
    pointer-events:none; opacity:0;
  }
  #tagline {
    position:absolute; bottom:-44px; left:50%; transform:translateX(-50%);
    color:#444; font-size:12px; letter-spacing:8px;
    text-transform:uppercase; white-space:nowrap; opacity:0;
  }
  #fade-out {
    position:fixed; inset:0; background:#000;
    opacity:0; pointer-events:none; z-index:300;
    transition:opacity 0.7s ease;
  }
  #bottom-hint {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
    color:#222; font-size:11px; letter-spacing:3px;
    opacity:0; white-space:nowrap; transition:opacity 1s ease;
  }

  const glow    = document.getElementById('glow');
  const tagline = document.getElementById('tagline');
  const curtain = document.getElementById('curtain');
  const fadeOut = document.getElementById('fade-out');
  const hint    = document.getElementById('bottom-hint');
  const audio   = document.getElementById('tadum-audio');

  // T=0: ë¹¨ê° ì»¤í¼ íëì
  curtain.style.transition = 'opacity 0.12s ease';
  curtain.style.opacity    = '1';
  setTimeout(() => {
    curtain.style.transition = 'opacity 0.4s ease';
    curtain.style.opacity    = '0';
  }, 120);

  // T=80ms: ì¬ì´ë (ìëì¬ì â ì¤í¨í´ë ë¬´ì)
  setTimeout(() => {
    audio.currentTime = 0;
    audio.play().catch(() => {});
  }, 80);

  // T=100ms: ê¸ë¡ì°
  setTimeout(() => {
    glow.style.transition = 'opacity 0.4s ease';
    glow.style.opacity    = '1';
  }, 100);

  // T=150ms: ON í­ë° ë±ì¥
  setTimeout(() => {
    onBlock.style.transition = 'opacity 0.1s ease, transform 0.55s cubic-bezier(0.1,0,0.05,1), filter 0.55s ease';
    onBlock.style.opacity    = '1';
    onBlock.style.transform  = 'scale(1)';
    onBlock.style.filter     = 'brightness(1)';
  }, 150);

  // T=550ms: ë¼ì¸ì°ê³ ì¸ë§ì¤í¬
  setTimeout(() => {
    rest.style.transition = 'clip-path 0.65s cubic-bezier(0.35,0,0.1,1)';
    rest.style.clipPath   = 'inset(0 0% 0 0)';
  }, 550);

  // T=590ms: ë¹ ì¤ì
  setTimeout(() => {
    sweep.style.opacity = '1';
    sweep.style.left    = '-50%';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      sweep.style.transition = 'left 0.9s cubic-bezier(0.4,0,0.2,1)';
      sweep.style.left       = '160%';
    }));
    setTimeout(() => { sweep.style.opacity = '0'; }, 900);
  }, 590);

  // T=1500ms: íê·¸ë¼ì¸ + íí¸
  setTimeout(() => {
    tagline.style.transition = 'opacity 1s ease';
    tagline.style.opacity    = '1';
    hint.style.opacity       = '1';
  }, 1500);

  // T=3200ms: íì´ë ìì
  setTimeout(() => { fadeOut.style.opacity = '1'; }, 3200);

  // T=3900ms: ë©ì¸ì¼ë¡ ì´ë
  setTimeout(() => { window.location.href = '/main'; }, 3900);
}

// ââ íì´ì§ ë¡ë ì¦ì ìì ââ
window.addEventListener('load', () => {
  // ìëì¬ì ì ì± ì°í ìë
  document.body.addEventListener('click', () => {}, { once: true });
  runIntro();
});
</script>
