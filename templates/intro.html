<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>온라인연계 – 하이마트 실시간 가격 추천</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000; overflow: hidden;
    font-family: 'Noto Sans KR', sans-serif;
  }

  #glow {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, rgba(229,9,20,0.25) 0%, transparent 70%);
    pointer-events: none; opacity: 0;
  }

  #stage {
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }

  #logo {
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }

  .letter {
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 900;
    font-size: clamp(60px, 12vw, 140px);
    line-height: 1;
    color: #E50914;
    text-shadow: 2px 2px 0 #8B0000, 5px 5px 0 #5a0000, 0 0 60px rgba(229,9,20,0.4);
  }

  /* N: 정가운데 크게 등장, 뒤로 빠짐 */
  #n-letter {
    position: relative;
    z-index: 10;
    opacity: 0;
    transform: scale(4);
    filter: brightness(4);
    letter-spacing: 0;
  }

  /* O: N 뒤에서 왼쪽으로 빠져나옴 */
  #o-letter {
    opacity: 0;
    transform: translateX(100px);
    letter-spacing: -4px;
  }

  /* 라인연계: N 뒤에서 오른쪽으로 빠져나옴 */
  #rest-letters {
    opacity: 0;
    transform: translateX(-100px);
    white-space: nowrap;
    letter-spacing: -4px;
  }

  #tagline {
    position: absolute; bottom: -40px; left: 50%; transform: translateX(-50%);
    color: #333; font-size: 11px; letter-spacing: 7px;
    text-transform: uppercase; white-space: nowrap; opacity: 0;
  }

  #fade-out {
    position: fixed; inset: 0; background: #000;
    opacity: 0; pointer-events: none; z-index: 300;
    transition: opacity 0.7s ease;
  }

  #bottom-hint {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    color: #1a1a1a; font-size: 11px; letter-spacing: 3px;
    opacity: 0; white-space: nowrap; transition: opacity 1s ease;
  }
</style>
</head>
<body>

<div id="fade-out"></div>
<div id="glow"></div>

<div id="stage">
  <div id="logo">
    <div id="o-letter" class="letter">O</div>
    <div id="n-letter" class="letter">N</div>
    <div id="rest-letters" class="letter">라인연계</div>
    <div id="tagline">HiMart Intelligence · Real-Time Price</div>
  </div>
</div>

<div id="bottom-hint">하이마트 실시간 가격 추천 플랫폼</div>

<script>
function runIntro() {
  const n       = document.getElementById('n-letter');
  const o       = document.getElementById('o-letter');
  const rest    = document.getElementById('rest-letters');
  const glow    = document.getElementById('glow');
  const tagline = document.getElementById('tagline');
  const fadeOut = document.getElementById('fade-out');
  const hint    = document.getElementById('bottom-hint');

  // T=0: 붉은 글로우
  glow.style.transition = 'opacity 0.5s ease';
  glow.style.opacity = '1';

  // T=80ms: N 정가운데 크게 팝업
  setTimeout(() => {
    n.style.transition = 'opacity 0.12s ease, transform 0.6s cubic-bezier(0.05,0,0.05,1), filter 0.6s ease';
    n.style.opacity = '1';
    n.style.transform = 'scale(1)';
    n.style.filter = 'brightness(1)';
  }, 80);

  // T=750ms: N이 자리잡으면 — O는 왼쪽으로, 라인연계는 오른쪽으로
  setTimeout(() => {
    o.style.transition = 'opacity 0.45s ease, transform 0.7s cubic-bezier(0.2,0,0.1,1)';
    o.style.opacity = '1';
    o.style.transform = 'translateX(0)';

    rest.style.transition = 'opacity 0.45s ease, transform 0.7s cubic-bezier(0.2,0,0.1,1)';
    rest.style.opacity = '1';
    rest.style.transform = 'translateX(0)';
  }, 750);

  // T=1700ms: 태그라인, 하단 힌트
  setTimeout(() => {
    tagline.style.transition = 'opacity 1s ease';
    tagline.style.opacity = '1';
    hint.style.opacity = '1';
  }, 1700);

  // T=3300ms: 페이드 아웃
  setTimeout(() => { fadeOut.style.opacity = '1'; }, 3300);

  // T=4000ms: 메인으로 이동
  setTimeout(() => { window.location.href = '/main'; }, 4000);
}

window.addEventListener('load', runIntro);
</script>
</body>
</html>
