<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}온라인 홍보{% endblock %} | HiMart Intelligence</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/promo.css', v='20260401-4') }}">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  {% block head %}{% endblock %}
</head>
<body class="promo-body{% if embed_mode %} embed-mode{% endif %}">
  <div class="promo-shell">
    {% if not embed_mode %}
    <header class="promo-topbar">
      <div class="promo-inner">
        <a class="promo-brand" href="/main">
          <div class="promo-brand-mark">H</div>
          <div class="promo-brand-copy">
            <strong>HiMart Promotion OS</strong>
            <span>{{ store_name }}</span>
          </div>
        </a>
        <nav class="promo-nav">
          {% for item in nav_items %}
          <a href="{{ item.href }}" class="{% if active_nav == item.key %}active{% endif %}">{{ item.label }}</a>
          {% endfor %}
        </nav>
      </div>
    </header>
    {% endif %}
    <main class="promo-main">
      <div class="promo-inner">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>
  <div id="promo-toast" class="promo-toast"></div>
  <script src="{{ url_for('static', filename='js/promo-common-r20260401.js', v='20260426-1') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
